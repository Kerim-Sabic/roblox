name: Feature request
description: Suggest a safety, reliability, automation, or UX improvement.
labels: ["enhancement", "needs triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Safety, Reliability, UI and accessibility, Automation, Detection, Extensions, Integrations, Packaging, Other]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem without prescribing implementation details.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Include safe defaults, failure behavior, and any compatibility needs.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This does not require Roblox injection, memory access, anti-cheat bypass, or arbitrary remote execution.
          required: true
