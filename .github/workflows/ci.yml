name: CI

on:
  pull_request:
  push:
    branches: [main, "feat/**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: ./scripts/verify-no-secrets.ps1
      - run: ./scripts/verify-parity-fixtures.ps1
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
      - run: pnpm --filter @nectarpilot/desktop check
      - run: pnpm --filter @nectarpilot/desktop lint
      - run: pnpm --filter @nectarpilot/desktop test
      - run: pnpm --filter @nectarpilot/desktop build
      - run: ./scripts/prepare-daemon-sidecar.ps1 -Configuration Debug
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Validate all generated legacy harness variants
        run: cargo run -p nectarpilot-legacy --bin validate_legacy_assets

      - name: Build unsigned per-user NSIS installer
        run: pnpm bundle:unsigned

      - name: Upload installer smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: NectarPilot-unsigned-NSIS
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
